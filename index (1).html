const callClaude = async (prompt, apiKey) => {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "API-fel");
  return (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
};

/* Genererar ett fält och returnerar de uppdaterade egenskaperna.
   autoPick=true (kö): valda namn/titlar sätts automatiskt. */
const genField = async (p, field, storeProfile, autoPick, apiKey) => {
  const raw = stripFences(await callClaude(buildPrompts(p, storeProfile)[field], apiKey));
  switch (field) {
    case "keywords": {
      const j = JSON.parse(raw);
      return { primaryKeyword: j.primary || "", secondaryKeywords: (j.secondary || []).join(", ") };
    }
    case "productNames": {
      const j = JSON.parse(raw);
      const names = j.names || [];
      const pick = Math.min(Math.max((j.pick || 1) - 1, 0), names.length - 1);
      const out = { nameVariants: names };
      if (autoPick && names[pick]) {
        out.originalName = p.originalName || p.productName;
        out.productName = names[pick];
      }
      return out;
    }
    case "seoTitle": {
      const j = JSON.parse(raw);
      const v = j.variants || [];
      let pick = Math.min(Math.max((j.pick || 1) - 1, 0), v.length - 1);
      const valid = v.filter((t) => t.length <= 60 && /\|\s*éclore\s*$/i.test(t));
      if (v[pick] && (v[pick].length > 60) && valid.length) pick = v.indexOf(valid[0]);
      return { titleVariants: v, seoTitle: v[pick] || v[0] || "", titleWhy: j.why || "" };
    }
    case "urlHandle": {
      const v = JSON.parse(raw);
      const out = { handleVariants: v };
      if (!p.currentHandle && autoPick && v[0]) out.handle = v[0]; // byt aldrig befintlig URL automatiskt
      return out;
    }
    case "bulletPoints": case "tags": case "keyIngredients":
      return { [field]: JSON.parse(raw) };
    case "usage":
      return { usage: JSON.parse(raw) };
    case "faq": {
      const j = JSON.parse(raw);
      return { faq: [1, 2, 3, 4, 5].map((i) => ({ q: j[`faq_q${i}`] || "", a: j[`faq_a${i}`] || "" })) };
    }
    default:
      return { [field]: raw };
  }
};

  ["seoTitle", "Skriver title-tagg"],
  ["urlHandle", "Föreslår URL"],

  ["shortDescription", "Skriver ingress"],
  ["bulletPoints", "Bullet points"],
  ["description", "Produktbeskrivning"],
  ["faq", "FAQ"],
  ["usage", "Användning"],
  ["keyIngredients", "Nyckelingredienser"],

];

const runChecks = (p) => {
  const out = [];
  const kw = (p.primaryKeyword || "").toLowerCase().trim();
  if (p.seoTitle) {
    out.push({ ok: p.seoTitle.length <= 60, label: `Title ${p.seoTitle.length}/60 tecken` });
    out.push({ ok: /\|\s*éclore\s*$/i.test(p.seoTitle), label: 'Title slutar med "| éclore"' });
    if (kw) out.push({ ok: p.seoTitle.toLowerCase().includes(kw), label: "Sökord i title" });
  }
  if (p.seoDescription) {
    out.push({ ok: p.seoDescription.length <= 155, label: `Meta ${p.seoDescription.length}/155 tecken` });
    if (kw) out.push({ ok: p.seoDescription.toLowerCase().includes(kw), label: "Sökord i meta" });
  }
  if (kw && p.shortDescription) out.push({ ok: p.shortDescription.toLowerCase().includes(kw), label: "Sökord i ingress" });
  if (kw && p.description) out.push({ ok: p.description.toLowerCase().includes(kw), label: "Sökord i beskrivning" });
  const allText = [p.description, p.shortDescription, (p.bulletPoints || []).join(" "), p.seoTitle, p.seoDescription, (p.faq || []).map((f) => f.q + " " + f.a).join(" ")].join(" ");
  if (allText.trim()) {
    const leaks = CERT_SCAN.filter((c) => c.word.test(allText) && !c.cert.some((x) => (p.certs || []).includes(x))).map((c) => c.cert[0]);
    [...new Set(leaks)].forEach((l) => out.push({ ok: false, label: `Texten nämner "${l}" – inte ibockad. Kontrollera!` }));
  }
  return out;
};

/* ───────────────────────── Shopify Admin API ───────────────────────── */

const sfHeaders = (s) => ({ "X-Shopify-Access-Token": s.shopifyToken, "Content-Type": "application/json" });
const sfBase = (s) => `https://${s.shopifyStore.replace(/^https?:\/\//, "").replace(/\/$/, "")}/admin/api/2024-01`;

const fetchFromShopify = async (s, productId) => {
  const res = await fetch(`${sfBase(s)}/products/${productId}.json`, { headers: sfHeaders(s) });
  if (!res.ok) throw new Error(`Shopify svarade ${res.status} – kontrollera butik, token (read_products) och produkt-ID.`);
  const { product } = await res.json();
  const patch = {
    shopifyId: String(product.id),
    productName: product.title || "",
    originalName: product.title || "",
    description: product.body_html || "",
    tags: product.tags ? product.tags.split(", ").filter(Boolean) : [],
    handle: product.handle || "",
    currentHandle: product.handle || "",
    productType: detectType(product.title) || "",
  };
  try {
    const mfRes = await fetch(`${sfBase(s)}/products/${productId}/metafields.json`, { headers: sfHeaders(s) });
    if (mfRes.ok) {
      const mfs = (await mfRes.json()).metafields || [];
      const get = (k) => mfs.find((m) => m.key === k && m.namespace === "custom")?.value || "";
      if (get("ingredients")) patch.inci = get("ingredients");
      patch.seoTitle = mfs.find((m) => m.key === "title_tag")?.value || "";
      patch.seoDescription = mfs.find((m) => m.key === "description_tag")?.value || "";
      if (get("short_description")) patch.shortDescription = get("short_description");
      const bp = get("bullet_points");
      if (bp) patch.bulletPoints = [...bp.split("\n").filter(Boolean), "", "", "", "", ""].slice(0, 5);
      const faq = [1, 2, 3, 4, 5].map((i) => ({ q: get(`faq_q${i}`), a: get(`faq_a${i}`) })).filter((x) => x.q || x.a);
      if (faq.length) patch.faq = faq;
      const u = get("usage_instructions");
      if (u) {
        const parts = u.split(/\n\n/);
        patch.usage = { intro: parts[0] || "", steps: (parts[1] || "").split("\n").map((x) => x.replace(/^\d+\.\s*/, "")).filter(Boolean) };
      }
      const ki = get("key_ingredients");
      if (ki) { try { patch.keyIngredients = JSON.parse(ki).map((x) => ({ name: x.name || "", effect: x.effect || x.benefit || "" })); } catch {} }
    }
  } catch {}
  try {
    const imgRes = await fetch(`${sfBase(s)}/products/${productId}/images.json`, { headers: sfHeaders(s) });
    if (imgRes.ok) {
      const imgs = (await imgRes.json()).images || [];
      patch.images = imgs.map((img) => ({
        shopifyImageId: img.id, url: img.src,
        filename: img.src.split("/").pop().split("?")[0],
        suggestedFilename: "", altText: img.alt || "",
      }));
    }
  } catch {}
  return patch;
};

const upsertMetafield = async (s, productId, existing, mf) => {
  const found = existing.find((m) => m.namespace === mf.namespace && m.key === mf.key);
  if (found) {
    return fetch(`${sfBase(s)}/metafields/${found.id}.json`, {
      method: "PUT", headers: sfHeaders(s),
      body: JSON.stringify({ metafield: { id: found.id, value: mf.value, type: found.type || mf.type } }),
    });
  }
  return fetch(`${sfBase(s)}/products/${productId}/metafields.json`, {
    method: "POST", headers: sfHeaders(s),
    body: JSON.stringify({ metafield: { ...mf, owner_resource: "product" } }),
  });
};

const publishProduct = async (s, p, onStep) => {
  if (!p.shopifyId) throw new Error("Produkten saknar Shopify-ID – hämta den från Shopify först.");
  const pid = p.shopifyId;
  const handleChanged = p.handle && p.currentHandle && p.handle !== p.currentHandle;
  onStep("Uppdaterar produkt (namn, beskrivning, taggar)...");
  const body = { product: { id: Number(pid), title: p.productName, body_html: p.description, tags: (p.tags || []).join(", ") } };
  if (p.handle) body.product.handle = p.handle;
  const res = await fetch(`${sfBase(s)}/products/${pid}.json`, { method: "PUT", headers: sfHeaders(s), body: JSON.stringify(body) });
  if (!res.ok) {
    let err = ""; try { err = JSON.stringify((await res.json()).errors); } catch {}
    throw new Error(`Shopify-fel ${res.status}: ${err || "kontrollera write_products-behörighet"}`);
  }
  onStep("Uppdaterar metafält (SEO, FAQ, bullets, ingredienser)...");
  const mfRes = await fetch(`${sfBase(s)}/products/${pid}/metafields.json`, { headers: sfHeaders(s) });
  const existing = mfRes.ok ? (await mfRes.json()).metafields || [] : [];
  const mfs = [
    { namespace: "global", key: "title_tag", value: p.seoTitle, type: "single_line_text_field" },
    { namespace: "global", key: "description_tag", value: p.seoDescription, type: "single_line_text_field" },
    { namespace: "custom", key: "ingredients", value: p.inci, type: "multi_line_text_field" },
    { namespace: "custom", key: "short_description", value: p.shortDescription, type: "multi_line_text_field" },
    { namespace: "custom", key: "bullet_points", value: (p.bulletPoints || []).filter(Boolean).join("\n"), type: "multi_line_text_field" },
    { namespace: "custom", key: "usage_instructions", value: p.usage ? `${p.usage.intro}\n\n${(p.usage.steps || []).map((x, i) => `${i + 1}. ${x}`).join("\n")}` : "", type: "multi_line_text_field" },
    { namespace: "custom", key: "key_ingredients", value: (p.keyIngredients || []).length ? JSON.stringify(p.keyIngredients.map((k) => ({ name: k.name, benefit: k.effect }))) : "", type: "json" },
    ...(p.faq || []).flatMap((f, i) => [
      { namespace: "custom", key: `faq_q${i + 1}`, value: f.q, type: "single_line_text_field" },
      { namespace: "custom", key: `faq_a${i + 1}`, value: f.a, type: "multi_line_text_field" },
    ]),
  ].filter((m) => m.value);
  for (const mf of mfs) await upsertMetafield(s, pid, existing, mf);
  const imgsToUpdate = (p.images || []).filter((i) => i.shopifyImageId && i.altText);
  if (imgsToUpdate.length) {
    onStep("Uppdaterar alt-texter...");
    for (const img of imgsToUpdate) {
      await fetch(`${sfBase(s)}/products/${pid}/images/${img.shopifyImageId}.json`, {
        method: "PUT", headers: sfHeaders(s),
        body: JSON.stringify({ image: { id: img.shopifyImageId, alt: img.altText } }),
      });
    }
  }
  if (handleChanged) {
    onStep("Skapar 301-redirect för gamla URL:en...");
    await fetch(`${sfBase(s)}/redirects.json`, {
      method: "POST", headers: sfHeaders(s),
      body: JSON.stringify({ redirect: { path: `/products/${p.currentHandle}`, target: `/products/${p.handle}` } }),
    });
  }
  return handleChanged;
};

              <textarea style={{ ...S.ta, minHeight: 54 }} value={form.seoDescription} onChange={(e) => setField("seoDescription", e.target.value)} />
              <span style={{ ...S.small, color: form.seoDescription.length > 155 ? "#9B3B2E" : "#7A8468" }}>{form.seoDescription.length}/155 tecken</span>
            </OutBlock>

            <OutBlock title="Ingress (above the fold)" field="shortDescription" copyValue={form.shortDescription}>
              <textarea style={{ ...S.ta, minHeight: 80 }} value={form.shortDescription} onChange={(e) => setField("shortDescription", e.target.value)} />
            </OutBlock>

            <OutBlock title="Bullet points" field="bulletPoints" copyValue={form.bulletPoints.filter(Boolean).join("\n")}>
              {form.bulletPoints.map((b, i) => (
                <input key={i} style={{ ...S.input, marginBottom: 6 }} value={b}
                  onChange={(e) => { const arr = [...form.bulletPoints]; arr[i] = e.target.value; setField("bulletPoints", arr); }} />
              ))}
            </OutBlock>

            <OutBlock title="Produktbeskrivning (HTML)" field="description" copyValue={form.description}>
              <textarea style={{ ...S.ta, minHeight: 180, fontFamily: "ui-monospace,monospace", fontSize: 12 }} value={form.description} onChange={(e) => setField("description", e.target.value)} />
              {form.description && (
                <details style={{ marginTop: 6 }}>
                  <summary style={{ ...S.small, cursor: "pointer" }}>Förhandsgranska</summary>
                  <div style={{ ...S.out, marginTop: 6 }} dangerouslySetInnerHTML={{ __html: form.description }} />
                </details>
              )}
            </OutBlock>

            <OutBlock title="FAQ (5 st)" field="faq" copyValue={form.faq.map((f) => `${f.q}\n${f.a}`).join("\n\n")}>
              {form.faq.length === 0 ? <div style={S.out}>Inte genererad ännu.</div> :
                form.faq.map((f, i) => (
                  <div key={i} style={{ marginBottom: 8 }}>
                    <input style={{ ...S.input, fontWeight: 600, marginBottom: 4 }} value={f.q}
                      onChange={(e) => { const arr = [...form.faq]; arr[i] = { ...arr[i], q: e.target.value }; setField("faq", arr); }} />
                    <textarea style={{ ...S.ta, minHeight: 60, fontSize: 12 }} value={f.a}
                      onChange={(e) => { const arr = [...form.faq]; arr[i] = { ...arr[i], a: e.target.value }; setField("faq", arr); }} />
                  </div>
                ))}
            </OutBlock>

            <OutBlock title="Användningsinstruktioner" field="usage"
              copyValue={form.usage ? `${form.usage.intro}\n\n${(form.usage.steps || []).map((s, i) => `${i + 1}. ${s}`).join("\n")}` : ""}>
              {form.usage ? (
                <div style={S.out}>
                  <p style={{ marginTop: 0 }}>{form.usage.intro}</p>
                  <ol style={{ margin: 0, paddingLeft: 18 }}>{(form.usage.steps || []).map((s, i) => <li key={i}>{s}</li>)}</ol>
                </div>
              ) : <div style={S.out}>Inte genererad ännu.</div>}
            </OutBlock>

            <OutBlock title="Nyckelingredienser" field="keyIngredients" copyValue={form.keyIngredients.map((k) => `${k.name} – ${k.effect}`).join("\n")}>
              {form.keyIngredients.length === 0 ? <div style={S.out}>Inte genererade ännu.</div> : (
                <div style={S.out}>{form.keyIngredients.map((k, i) => <div key={i} style={{ marginBottom: 4 }}><strong>{k.name}</strong> – {k.effect}</div>)}</div>
              )}
            </OutBlock>

            <OutBlock title="Produkttaggar" field="tags" copyValue={form.tags.join(", ")}>
              {form.tags.length === 0 ? <div style={S.out}>Inte genererade ännu.</div> : (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{form.tags.map((t, i) => <span key={i} style={S.chip(true)}>{t}</span>)}</div>
              )}
            </OutBlock>
          </div>
        </section>

        <section style={S.card}>
          <h2 style={S.h2}>4 · Bilder (filnamn + alt-text)</h2>
          {form.images.map((img, i) => (
            <div key={i} style={{ ...S.out, marginBottom: 8 }}>
              <label style={S.label}>Nuvarande filnamn</label>
              <input style={S.input} value={img.filename}
                onChange={(e) => { const arr = [...form.images]; arr[i] = { ...arr[i], filename: e.target.value }; setField("images", arr); }} />
              {img.suggestedFilename && <p style={{ margin: "4px 0", fontSize: 12 }}><strong>Förslag:</strong> {img.suggestedFilename}</p>}
              {img.altText && <p style={{ margin: "4px 0", fontSize: 12 }}><strong>Alt-text:</strong> {img.altText}</p>}
              <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
                <button style={S.btnGhost} onClick={() => generateImageMeta(i)} disabled={!!generating[`img_${i}`]}>
                  {generating[`img_${i}`] ? "Genererar..." : "Generera"}
                </button>
                {img.altText && <button style={S.btnGhost} onClick={() => doCopy(`img_${i}`, `${img.suggestedFilename}\n${img.altText}`)}>{copied === `img_${i}` ? "✓" : "Kopiera"}</button>}
                <button style={{ ...S.btnGhost, color: "#9B3B2E", borderColor: "#D8B4AC" }} onClick={() => setField("images", form.images.filter((_, x) => x !== i))}>Ta bort</button>
              </div>
            </div>
          ))}
          <button style={S.btnGhost} onClick={() => setField("images", [...form.images, { filename: "", suggestedFilename: "", altText: "" }])}>+ Lägg till bild</button>
        </section>

        <ChecksPanel p={form} />

        {form.shopifyId && (
          <section style={{ ...S.card, borderLeft: "4px solid #46522F" }}>
            <h2 style={S.h2}>Publicera till Shopify</h2>
            <p style={S.small}>Uppdaterar produktnamn, beskrivning, taggar, URL, SEO-metafält, ingress, bullets, FAQ, användning, nyckelingredienser och alt-texter.</p>
            <button style={{ ...S.btn, marginTop: 8 }} onClick={() => publish(form, "single")} disabled={!sfReady}>
              Publicera till Shopify
            </button>
            {publishState[form.id] && <p style={{ fontSize: 13, marginTop: 8, color: publishState[form.id].startsWith("✕") ? "#9B3B2E" : "#46522F" }}>{publishState[form.id]}</p>}
          </section>
        )}
      </div>
    );
  };

  return (
    <div style={S.page}>
      <div style={S.wrap}>
        <header style={{ marginBottom: 14 }}>
          <h1 style={{ fontFamily: "Georgia,serif", fontSize: 26, fontWeight: 600, margin: 0, color: "#2C351C" }}>
            éclore <span style={{ fontStyle: "italic", fontWeight: 400 }}>produktstudio</span>
          </h1>
          <p style={{ ...S.small, marginTop: 4 }}>Produktanpassade texter med rätt sökord, certifieringar och USP:ar – enligt éclores SEO-regler.</p>
        </header>

        <div style={{ display: "flex", gap: 4, background: "#E4E8DB", borderRadius: 10, padding: 4, marginBottom: 14, width: "fit-content" }}>
          <button style={S.tab(mode === "single")} onClick={() => { setMode("single"); setReviewIdx(-1); }}>Enskild produkt</button>
          <button style={S.tab(mode === "queue")} onClick={() => setMode("queue")}>
            Kö {queue.length > 0 ? `(${queue.length})` : ""}
          </button>
        </div>

        {mode === "single" ? <SingleView /> : (reviewIdx >= 0 ? <ReviewView /> : <QueueView />)}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<EcloreProduktstudio />);

</script>
</body>
</html>
