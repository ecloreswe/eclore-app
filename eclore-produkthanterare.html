<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;

/* ───────────────────────── Kunskapsbas ───────────────────────── */

const PRODUCT_TYPES = {
  "Ansiktsserum": { kw: ["ansiktsserum", "naturligt serum", "veganskt serum", "serum för känslig hud", "anti-age serum"], concerns: "när i rutinen serumet används (före kräm), morgon eller kväll, kombination med andra aktiva ingredienser, hur snabbt resultat syns, passar det känslig hud", coll: "https://www.eclore.se/collections/ansiktsvard" },
  "Ansiktskräm": { kw: ["ansiktskräm", "naturlig ansiktskräm", "ansiktskräm torr hud", "ansiktskräm känslig hud", "vegansk ansiktskräm"], concerns: "passar den min hudtyp, dag eller natt, hur mycket man använder, fungerar den under smink, parfymfri eller inte", coll: "https://www.eclore.se/collections/ansiktskram" },
  "Ansiktsolja": { kw: ["ansiktsolja", "naturlig ansiktsolja", "ansiktsolja torr hud"], concerns: "blir huden fet, komedogen eller inte, före eller efter kräm, hur många droppar", coll: "https://www.eclore.se/collections/ansiktsvard" },
  "Ansiktsrengöring": { kw: ["ansiktsrengöring", "naturlig ansiktsrengöring", "mild rengöring känslig hud"], concerns: "torkar den ut huden, tar den bort smink, morgon och kväll, passar känslig hud", coll: "https://www.eclore.se/collections/ansiktsvard" },
  "Ansiktsvatten / Toner": { kw: ["ansiktsvatten", "toner", "probiotisk toner", "naturligt ansiktsvatten"], concerns: "vad gör en toner, när i rutinen, behöver man skölja av, alkoholfri eller inte", coll: "https://www.eclore.se/collections/ansiktsvard" },
  "Ansiktsmask": { kw: ["ansiktsmask", "naturlig ansiktsmask", "återfuktande mask"], concerns: "hur ofta, hur länge ska den sitta, sköljs den av, passar känslig hud", coll: "https://www.eclore.se/collections/ansiktsvard" },
  "Ögonkräm": { kw: ["ögonkräm", "naturlig ögonkräm", "ögonkräm mot påsar"], concerns: "hjälper den mot mörka ringar och påsar, morgon eller kväll, hur appliceras den", coll: "https://www.eclore.se/collections/ansiktsvard" },
  "Läppbalsam": { kw: ["läppbalsam", "naturligt läppbalsam", "veganskt läppbalsam"], concerns: "hur länge håller effekten, innehåller den bivax (veganskt?), smak och doft", coll: "https://www.eclore.se/collections/ansiktsvard" },
  "Schampo": { kw: ["naturligt schampo", "schampo utan sulfater", "veganskt schampo", "schampo torrt hår", "schampo fett hår"], concerns: "löddrar det utan sulfater, passar färgat hår, övergångsperiod från vanligt schampo, hur ofta man tvättar, silikonfritt", coll: "https://www.eclore.se/collections/schampo-och-balsam" },
  "Balsam": { kw: ["naturligt balsam", "balsam utan silikoner", "balsam torrt hår"], concerns: "tynger det håret, passar fint hår, balsammetoden, färgat hår", coll: "https://www.eclore.se/collections/schampo-och-balsam" },
  "Hårmask": { kw: ["hårmask", "naturlig hårmask", "hårinpackning torrt hår"], concerns: "hur ofta, hur länge ska den verka, ersätter den balsam", coll: "https://www.eclore.se/collections/harvard" },
  "Hårolja": { kw: ["hårolja", "naturlig hårolja", "hårolja torra toppar"], concerns: "i torrt eller fuktigt hår, blir håret flottigt, hur mycket man använder", coll: "https://www.eclore.se/collections/harvard" },
  "Brun utan sol": { kw: ["brun utan sol", "brun utan sol mousse", "naturlig brun utan sol", "self tan", "streckfri brun utan sol"], concerns: "blir det streck eller fläckar, hur länge håller färgen, hur länge innan dusch, luktar den self tan, förberedelse med skrubb, applicering med handske", coll: "https://www.eclore.se/collections/brun-utan-sol" },
  "Kroppsskrubb": { kw: ["kroppsskrubb", "body scrub", "naturlig kroppsskrubb", "sockerskrubb", "saltskrubb"], concerns: "hur ofta man skrubbar, före brun utan sol, känslig hud, skillnad socker och salt", coll: "https://www.eclore.se/collections/kroppsvard" },
  "Kroppslotion": { kw: ["kroppslotion", "naturlig kroppslotion", "kroppslotion torr hud"], concerns: "drar den in snabbt, kladdar den, doft, mycket torr hud", coll: "https://www.eclore.se/collections/kroppsvard" },
  "Kroppsolja": { kw: ["kroppsolja", "naturlig kroppsolja", "kroppsolja torr hud"], concerns: "på fuktig eller torr hud, kladdar den, bristningar och ärr", coll: "https://www.eclore.se/collections/kroppsvard" },
  "Duschtvål / Tvål": { kw: ["naturlig tvål", "handgjord tvål", "duschtvål naturlig", "fast tvål"], concerns: "torkar den ut huden, hur länge räcker en fast tvål, förvaring, ansikte och kropp", coll: "https://www.eclore.se/collections/kroppsvard" },
  "Deodorant": { kw: ["naturlig deodorant", "deodorant utan aluminium", "vegansk deodorant"], concerns: "fungerar den verkligen, aluminiumfri, övergångsperiod, vita märken på kläder, känslig hud efter rakning", coll: "https://www.eclore.se/collections/kroppsvard" },
  "Handkräm": { kw: ["handkräm", "naturlig handkräm", "handkräm torra händer"], concerns: "drar den in snabbt, kladdar den vid tangentbord, nariga händer vinter", coll: "https://www.eclore.se/collections/kroppsvard" },
  "Accessoar / Necessär": { kw: ["necessär", "sminkväska", "handgjord necessär", "kosmetikväska"], concerns: "material och skötsel, storlek och vad som får plats, handgjort hantverk, tål den fukt", coll: "https://www.eclore.se/collections/sminkvaskor" },
  "Annan produkt": { kw: [], concerns: "ingredienser, användning, hudtyp, ursprung, förvaring", coll: "https://www.eclore.se" },
};

const BRANDS = {
  "LUUV": "Naturlig hår- och kroppsvård samt brun utan sol. Produktnamn följer formatet: produkttyp + ingrediens/doft – egenskaper – storlek (t.ex. '50 ml' med mellanslag). Lyft naturliga ingredienser och resultat.",
  "BONOBO": "Naturlig hudvård i små batcher, framtagen i samarbete med örtkunnig expertis. Lyft grundarhistorien, hantverket och small-batch-produktionen. Använd INTE ursprungsland som säljargument – fokusera på hantverk och europeisk kvalitet.",
  "Tilk!": "Naturlig hudvård med ovanliga aktiva ingredienser, tillverkad med hantverkstradition. Flera produkter är prisbelönta – ange ev. utmärkelser i fältet Utmärkelser så vävs de in i texterna.",
  "Magrada": "Naturlig hudvård med växtbaserade aktiva ingredienser och hög andel ekologiskt. Lyft ingredienserna och deras konkreta effekt.",
  "Nurme": "Handgjorda naturliga tvålar och kroppsvård. Lyft hantverket, de rena ingredienslistorna och plastfri/minimal förpackning om det stämmer.",
  "Garbanota": "Naturlig hår- och kroppsvård i små batcher med växtbaserade ingredienser.",
  "HOIA": "Handgjord naturlig hudvård i små batcher. Lyft hantverk och noggrant utvalda ingredienser.",
  "Moi Mili": "Handgjorda accessoarer och textilier med illustrerade mönster. Lyft design, hantverk och material – inte hudvårdsargument.",
  "Zelma Kraft": "Handgjorda produkter med fokus på hantverk och naturliga material.",
  "Annat": "",
};

const CERTS = ["Vegansk", "Cruelty-free", "Naturliga ingredienser", "Ekologiska ingredienser", "COSMOS Organic", "Ecocert", "Handgjord", "Parfymfri", "Utan sulfater", "Silikonfri", "Utan parabener", "Aluminiumfri", "Plastfri förpackning"];

const CERT_SCAN = [
  { word: /ekologisk/i, cert: ["Ekologiska ingredienser", "COSMOS Organic", "Ecocert"] },
  { word: /cosmos/i, cert: ["COSMOS Organic"] },
  { word: /ecocert/i, cert: ["Ecocert"] },
  { word: /vegansk|veganskt/i, cert: ["Vegansk"] },
  { word: /cruelty.?free|djurtestad/i, cert: ["Cruelty-free"] },
  { word: /parfymfri/i, cert: ["Parfymfri"] },
  { word: /sulfatfri|utan sulfater/i, cert: ["Utan sulfater"] },
  { word: /silikonfri/i, cert: ["Silikonfri"] },
  { word: /parabenfri|utan parabener/i, cert: ["Utan parabener"] },
  { word: /aluminiumfri|utan aluminium/i, cert: ["Aluminiumfri"] },
];

const DEFAULT_PROFILE = `TONALITET: Varm auktoritet – som en kunnig vän som ger råd. Undvik hype, superlativ utan substans och ungdomligt slang. Använd gärna: "hantverk", "naturliga ingredienser", "tillverkat i Europa", "genuint", "noggrant utvalt".

KONVERTERING: Lyft ursprung och hantverk tidigt. Nämn konkreta ingredienser och deras effekt. Avsluta beskrivningen med en tydlig användningssituation. Bullet points = konkret nytta, inte floskler.

SEO: Primärt sökord naturligt i första meningen, i title och i meta. Long-tail-fokus (produkttyp + naturlig/vegansk + behov). Ingen keyword stuffing. H2-rubriker fokuserar på sökord och nytta – stapla inte varumärkesnamn i rubriker.`;

/* ───────────────────────── Hjälpfunktioner ───────────────────────── */

const detectType = (name) => {
  const n = (name || "").toLowerCase();
  const map = [
    ["brun utan sol", "Brun utan sol"], ["self tan", "Brun utan sol"], ["mousse", "Brun utan sol"],
    ["serum", "Ansiktsserum"], ["ansiktskräm", "Ansiktskräm"], ["face cream", "Ansiktskräm"],
    ["ansiktsolja", "Ansiktsolja"], ["rengöring", "Ansiktsrengöring"], ["cleanser", "Ansiktsrengöring"],
    ["toner", "Ansiktsvatten / Toner"], ["ansiktsvatten", "Ansiktsvatten / Toner"],
    ["ansiktsmask", "Ansiktsmask"], ["ögonkräm", "Ögonkräm"], ["läppbalsam", "Läppbalsam"], ["lip balm", "Läppbalsam"],
    ["schampo", "Schampo"], ["shampoo", "Schampo"], ["balsam", "Balsam"], ["conditioner", "Balsam"],
    ["hårmask", "Hårmask"], ["hair mask", "Hårmask"], ["hårolja", "Hårolja"], ["hair oil", "Hårolja"],
    ["skrubb", "Kroppsskrubb"], ["scrub", "Kroppsskrubb"],
    ["kroppslotion", "Kroppslotion"], ["body lotion", "Kroppslotion"], ["kroppsolja", "Kroppsolja"], ["body oil", "Kroppsolja"],
    ["tvål", "Duschtvål / Tvål"], ["soap", "Duschtvål / Tvål"], ["deo", "Deodorant"],
    ["handkräm", "Handkräm"], ["hand cream", "Handkräm"], ["necessär", "Accessoar / Necessär"], ["väska", "Accessoar / Necessär"], ["bag", "Accessoar / Necessär"],
  ];
  for (const [k, t] of map) if (n.includes(k)) return t;
  return "";
};

const stripFences = (s) => s.replace(/```json|```/g, "").trim();
const typeInfoOf = (p) => PRODUCT_TYPES[p.productType] || PRODUCT_TYPES["Annan produkt"];

const emptyProduct = () => ({
  id: Date.now() + Math.random(),
  shopifyId: "", handle: "", currentHandle: "", handleVariants: [],
  productName: "", originalName: "", brand: "", brandNote: "", productType: "", audience: "",
  brandUrl: "", sourceText: "",
  size: "", price: "", inci: "", certs: [], awards: "", usp: "",
  primaryKeyword: "", secondaryKeywords: "",
  nameVariants: [], seoTitle: "", titleVariants: [], titleWhy: "",
  description: "", shortDescription: "", bulletPoints: ["", "", "", "", ""],
  seoDescription: "", faq: [], usage: null, keyIngredients: [], tags: [],
  images: [], status: "väntar", approved: false,
});

/* ───────────────────────── Kontext & prompts ───────────────────────── */

const buildCtx = (p, storeProfile) => {
  const ti = typeInfoOf(p);
  const certs = p.certs.length ? p.certs.join(", ") : "Inga angivna";
  return `Du skriver produkttexter för éclore (eclore.se) – svensk e-handel för naturlig och vegansk hudvård, hårvård och kroppsvård, tillverkad i Europa.

${storeProfile}

PRODUKTFAKTA – använd ENDAST dessa fakta. Hitta ALDRIG på certifieringar, utmärkelser, ingredienser eller egenskaper som inte anges här:
- Produktnamn: ${p.productName || "(saknas)"}${p.originalName && p.originalName !== p.productName ? ` (originalnamn: ${p.originalName})` : ""}
- Varumärke: ${p.brand || "(ej angivet)"}${p.brandNote ? `. Om varumärket: ${p.brandNote}` : ""}
- Produkttyp: ${p.productType || "(ej angiven)"}
- Målgrupp / hud- eller hårtyp: ${p.audience || "alla"}
- Storlek: ${p.size || "(ej angiven)"}${p.price ? `, Pris: ${p.price} kr` : ""}
- Certifieringar och egenskaper (de ENDA som får nämnas): ${certs}
- Utmärkelser: ${p.awards || (p.sourceText ? "Inga angivna i fältet – MEN om källmaterialet ovan UTTRYCKLIGEN nämner utmärkelser eller priser ska du lyfta dem tidigt (ange namnet exakt som i källan – hitta aldrig på)" : "Inga – nämn inga utmärkelser")}
- ${p.productType === "Accessoar / Necessär" ? "Material och detaljer" : "INCI / ingredienser"}: ${p.inci || "(ej angiven)"}
- Övrig USP/info: ${p.usp || "—"}
- Källmaterial från varumärkets egen produktsida (verifiera fakta här och leta efter utmärkelser, effekter och positionering): ${String(p.sourceText || "").slice(0, 2500) || "(ej hämtat)"}
- Leverantörens originalbeskrivning (KÄLLMATERIAL – hämta fakta, vinklar och USP:ar härifrån, t.ex. effekter, utmärkelser, positionering. Skriv om på svenska, kopiera ALDRIG rakt av): ${String((p._orig && p._orig.body) || p.description || "").replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim().slice(0, 1500) || "(saknas)"}

SÖKORD:
- Primärt sökord: ${p.primaryKeyword || "(ej valt – utgå från produkttypen)"}
- Sekundära sökord: ${p.secondaryKeywords || "—"}
- Typiska svenska sökningar för produkttypen: ${ti.kw.join(", ") || "—"}

KÖPARENS VANLIGASTE FRÅGOR för denna produkttyp: ${ti.concerns}

HÅRDA REGLER:
1. Svenska. Naturligt språk, ingen keyword stuffing.
2. Primärt sökord ska finnas i första meningen av beskrivning och ingress – men det FÅR böjas och kompletteras med småord (med, och, för) så att meningen blir korrekt svenska. Grammatik går ALLTID före exakt ordföljd.
3. Nämn certifieringar/egenskaper ENDAST om de står i listan ovan. Skriv aldrig "ekologisk", "COSMOS", "parfymfri" etc. om det inte är angivet.
4. Nämn utmärkelser endast om de anges – och då gärna tidigt.
5. H2-rubriker = sökord och kundnytta, inte varumärkesupprepning.
6. Påstå inget medicinskt (botar, läker, behandlar eksem etc.) – skriv "kan lugna", "återfuktar", "stödjer".
7. Fetstil skrivs ALLTID som <strong>...</strong> i HTML – ALDRIG markdown-asterisker (**ord**).
8. Om "Ekologiska ingredienser" anges: skriv "med ekologiska ingredienser" eller nämn specifika ekologiska ingredienser (t.ex. "ekologisk arganolja") – påstå ALDRIG att hela produkten är ekologisk eller certifierad om inte COSMOS/Ecocert anges.
9. Korrekturläs all text: korrekt svensk stavning och grammatik. Var extra noga med sammansatta ord och ingrediensnamn (t.ex. "plommonkärnolja", aldrig "plommenkärnolja") och adjektivböjning ("detta naturliga schampo", aldrig "detta naturligt schampo").
10. Som AVSKILJARE i titlar, produktnamn och rubriker används alltid tankstreck "–", aldrig bindestreck "-". Bindestreck endast i riktiga sammansättningar (cruelty-free, latte-färg).
11. Var KONSEKVENT med fakta genom alla fält – samma antal fickor, dragkedjor, mått osv. överallt. Är en detalj inte angiven i produktfakta eller källmaterial: utelämna den hellre än att gissa. Undvik floskelavslut som "en investering för livet".`;
};

const buildPrompts = (p, storeProfile) => {
  const ctx = buildCtx(p, storeProfile);
  const ti = typeInfoOf(p);
  const acc = p.productType === "Accessoar / Necessär";
  return {
    keywords: `${ctx}\n\nFöreslå sökord för denna produkt baserat på produkttyp, ingredienser och målgrupp. Primärt sökord = mest köpnära long-tail (2–4 ord, svenska, realistisk sökvolym). Sökorden ska vara korrekt stavad, naturlig svenska – kontrollera särskilt sammansatta ord (t.ex. "plommonolja", aldrig "plommolja"). 5 sekundära sökord som varierar behov/egenskap. Svara BARA med JSON: {"primary":"...","secondary":["...","...","...","...","..."]}`,

    productNames: `${ctx}\n\nProduktens nuvarande (ofta engelska) namn: "${p.originalName || p.productName}".\n\nFöreslå 3 svenska produktnamn enligt éclores namnkonvention:\n[Produkttyp] [Ingrediens/Doft] – [Viktigaste egenskap] – [Storlek]\nExempel: "Deodorant Lavendel – Aluminiumfri – 50 ml", "Ansiktsserum Svart Vitlök – Anti-age – 30 ml".\n\nRegler:\n- Inget varumärkesnamn först (namnet blir H1 och ska vara sökordsfokuserat)\n- Storlek med mellanslag: "50 ml", "100 g"\n- Tankstreck "–" som avskiljare, aldrig bindestreck "-"\n- Behåll ev. känt produktnamn som mellandel ENDAST om det tillför sökvärde\n- Variera: 1 = ingrediens/doft-fokus, 2 = behov/egenskap-fokus, 3 = enklast möjliga\nVälj också den bästa (pick = 1, 2 eller 3) utifrån sökbarhet och tydlighet.\nSvara BARA med JSON: {"names":["...","...","..."],"pick":1}`,

    seoTitle: `${ctx}\n\nSkriv 3 title-taggar med dessa strategier:\n\n1. BEHOV FÖRST: Hudtyp/problem + produkttyp + starkaste differentiator.\n   Exempel: "Kroppskräm torr hud – kokos & mangosmör | éclore"\n   Differentiator = den mest unika ingrediensen ELLER ett konkret resultat – INTE bara doften.\n\n2. SÖKORD FÖRST: Primärt sökord exakt + kortaste möjliga unika detalj.\n   Exempel: "Naturlig kroppskräm kokos – lugnar & återfuktar | éclore"\n\n3. RESULTAT FÖRST: Vad kunden får ut av produkten + produkttyp.\n   Exempel: "Mjuk och återfuktad hud – naturlig kroppskräm kokos | éclore"\n\nVälj sedan den bästa enligt denna prioritet:\n- Produkttypen har tydlig hudtyp/målgrupp i INCI, källmaterial eller produktnamn (t.ex. torr hud, känslig hud, fett hår, anti-age) → välj 1\n- Varumärket har känd sökvolym i Sverige ELLER produkten har en utmärkelse → välj 2\n- Annars → välj 3\n\nRegler för ALLA tre:\n- Max 60 tecken TOTALT inklusive " | éclore" – " | éclore" = 9 tecken, kvarvarande utrymme = max 51 tecken. Räkna noggrant.\n- Naturlig svensk versalisering (inte Stor Bokstav På Varje Ord)\n- Tankstreck "–" som avskiljare, aldrig bindestreck "-"\n- Inga utfyllnadsord ("köp", "bästa", "online") och inget pris\n- Ingredienser används MAX som ett ord i differentiator – stapla aldrig 3+ ingredienser\nSvara BARA med JSON: {"variants":["...","...","..."],"pick":1,"why":"max 12 ord om varför"}`,

    seoDescription: `${ctx}\n\nSkriv en meta-beskrivning på max 155 tecken.\n\nStruktur:\n1. Börja med primärt sökord + hudtyp/behov om det finns – spegla titelns vinkel (t.ex. om titeln lyfter "torr hud" ska metan göra detsamma)\n2. Lyft sedan den starkaste konkreta nyttan: nyckelingrediens + effekt ELLER ett mätbart/kännbart resultat\n3. Avsluta med starkaste återstående argument i prioritetsordning:\n   a) Utmärkelse (ange exakt namn)\n   b) Konkret resultat (effekt, känsla, tidsaspekt)\n   c) Certifiering/egenskap från listan\n   d) "Fri frakt över 599 kr" (passa in när priset är under 599 kr)\n\nALDRIG: generiska avslut ("Upptäck hos éclore", "Handla nu"), vaga adjektiv ("exklusiv", "lyxig"), upprepning av title-taggen ord för ord, eller mer än max 155 tecken.\nReturnera ENDAST meta-beskrivningen som EN enda rad text – ingen rubrik, ingen produktbeskrivning, ingen övrig text före eller efter.`,

    urlHandle: `${ctx}\n\nNuvarande URL-handle: "${p.currentHandle || "(ny produkt)"}".\nFöreslå 3 URL-handles (slug) för produktsidan. Regler: lowercase, endast a-z, 0-9 och bindestreck (å/ä→a, ö→o, é→e), max 60 tecken, primärt sökord eller produkttyp först, inget varumärke om det inte tillför sökvärde, inga stoppord (och, med, för i onödan). Variera: 1 = sökord + variant/doft, 2 = produkttyp + behov, 3 = kortast möjliga. Svara BARA med JSON-array: ["...","...","..."]`,

    bulletPoints: `${ctx}\n\nSkriv exakt 5 bullet points (max 9 ord vardera) för produktsidan. Ordning: ${acc ? "1) viktigaste funktionen/designen, 2) material, 3) storlek/vad som ryms, 4) hantverk/ursprung, 5) skötsel eller presentvinkel" : "1) viktigaste effekten/resultatet, 2) nyckelingrediens + effekt, 3) certifiering/egenskap från listan ELLER andra effekt, 4) passar-för (hudtyp/behov), 5) ursprung/hantverk eller storlek/räckvidd"}. Inga punkter i slutet. Svara BARA med JSON-array: ["...","...","...","...","..."]`,

const callClaude = async (prompt, apiKey) => {
  for (let attempt = 0; attempt < 3; attempt++) {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
      }),
    });
    const data = await res.json();
    if (data.error) {
      const msg = data.error.message || "API-fel";
      const retryable = res.status === 429 || res.status >= 500 || /rate|overload/i.test(msg);
      if (retryable && attempt < 2) { await new Promise((r) => setTimeout(r, 3000 * (attempt + 1))); continue; }
      throw new Error(msg);
    }
    return (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
  }
  throw new Error("API-fel efter flera försök");
};

/* Genererar ett fält och returnerar de uppdaterade egenskaperna.
   autoPick=true (kö): valda namn/titlar sätts automatiskt. */
const safeParse = (raw) => {
  try { return JSON.parse(raw); } catch {}
  const m = String(raw).match(/\{[\s\S]*\}|\[[\s\S]*\]/);
  if (m) return JSON.parse(m[0]);
  throw new Error("Kunde inte tolka AI-svaret");
};

const mdToHtml = (s) => String(s || "").replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/\*\*/g, "");

const genField = async (p, field, storeProfile, autoPick, apiKey) => {
  const raw = stripFences(await callClaude(buildPrompts(p, storeProfile)[field], apiKey));
  switch (field) {
    case "keywords": {
      const j = safeParse(raw);
      return { primaryKeyword: j.primary || "", secondaryKeywords: (j.secondary || []).join(", ") };
    }
    case "productNames": {
      const j = safeParse(raw);
      const names = j.names || [];
      const pick = Math.min(Math.max((j.pick || 1) - 1, 0), names.length - 1);
      const out = { nameVariants: names };
      if (autoPick && names[pick]) {
        out.originalName = p.originalName || p.productName;
        out.productName = names[pick];
      }
      return out;
    }
    case "seoTitle": {
      const j = safeParse(raw);
      const v = j.variants || [];
      let pick = Math.min(Math.max((j.pick || 1) - 1, 0), v.length - 1);
      const valid = v.filter((t) => t.length <= 60 && /\|\s*éclore\s*$/i.test(t));
      if (v[pick] && (v[pick].length > 60) && valid.length) pick = v.indexOf(valid[0]);
      return { titleVariants: v, seoTitle: v[pick] || v[0] || "", titleWhy: j.why || "" };
    }
    case "seoDescription": {
      const firstLine = mdToHtml(raw).split("\n").map((l) => l.trim()).filter(Boolean)[0] || "";
      return { seoDescription: firstLine.replace(/^#+\s*/, "") };
    }
    case "urlHandle": {
      const v = safeParse(raw);
      const out = { handleVariants: v };
      if (!p.currentHandle && autoPick && v[0]) out.handle = v[0]; // byt aldrig befintlig URL automatiskt
      return out;
    }
    case "bulletPoints": case "tags": case "keyIngredients":
      return { [field]: safeParse(raw) };
    case "usage":
      return { usage: safeParse(raw) };
    case "faq": {
      const j = safeParse(raw);
      return { faq: [1, 2, 3, 4, 5].map((i) => ({ q: j[`faq_q${i}`] || "", a: mdToHtml(j[`faq_a${i}`] || "") })) };
    }
    default:
      return { [field]: mdToHtml(raw) };
  }
};

/* ───────────── Shopify rich text (RTF) ↔ HTML ───────────── */

const escHtml = (t) => String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

const richNodeToHtml = (n) => {
  if (!n) return "";
  if (n.type === "text") {
    let t = escHtml(n.value || "");
    if (n.bold) t = `<strong>${t}</strong>`;
    if (n.italic) t = `<em>${t}</em>`;
    return t;
  }
  const kids = (n.children || []).map(richNodeToHtml).join("");
  switch (n.type) {
    case "root": return kids;
    case "paragraph": return `<p>${kids}</p>`;
    case "heading": return `<h${n.level || 2}>${kids}</h${n.level || 2}>`;
    case "link": return `<a href="${escHtml(n.url || "")}">${kids}</a>`;
    case "list": return n.listType === "ordered" ? `<ol>${kids}</ol>` : `<ul>${kids}</ul>`;
    case "list-item": return `<li>${kids}</li>`;
    default: return kids;
  }
};

const richTextToHtml = (raw) => {
  if (!raw) return "";
  try {
    const j = JSON.parse(raw);
    if (j && j.type === "root") return richNodeToHtml(j);
  } catch {}
  return raw; // var redan HTML/vanlig text
};

const inlineToRich = (el) => {
  const out = [];
  el.childNodes.forEach((c) => {
    if (c.nodeType === 3) { if (c.textContent) out.push({ type: "text", value: c.textContent }); return; }
    const tag = (c.tagName || "").toLowerCase();
    if (tag === "strong" || tag === "b") {
      inlineToRich(c).forEach((n) => out.push(n.type === "text" ? { ...n, bold: true } : n));
    } else if (tag === "em" || tag === "i") {
      inlineToRich(c).forEach((n) => out.push(n.type === "text" ? { ...n, italic: true } : n));
    } else if (tag === "a") {
      out.push({ type: "link", url: c.getAttribute("href") || "", children: inlineToRich(c) });
    } else if (tag === "br") {
      out.push({ type: "text", value: " " });
    } else {
      inlineToRich(c).forEach((n) => out.push(n));
    }
  });
  return out.length ? out : [{ type: "text", value: "" }];
};

const htmlToRichText = (html) => {
  if (!html || !html.trim()) return "";
  const doc = new DOMParser().parseFromString(`<div>${html}</div>`, "text/html");
  const rootEl = doc.body.firstChild;
  const children = [];
  rootEl.childNodes.forEach((c) => {
    if (c.nodeType === 3) {
      if (c.textContent.trim()) children.push({ type: "paragraph", children: [{ type: "text", value: c.textContent.trim() }] });
      return;
    }
    const tag = (c.tagName || "").toLowerCase();
    const m = tag.match(/^h([1-6])$/);
    if (m) children.push({ type: "heading", level: Number(m[1]), children: inlineToRich(c) });
    else if (tag === "ul" || tag === "ol") {
      children.push({ type: "list", listType: tag === "ol" ? "ordered" : "unordered",
        children: Array.from(c.children).map((li) => ({ type: "list-item", children: inlineToRich(li) })) });
    } else {
      children.push({ type: "paragraph", children: inlineToRich(c) });
    }
  });
  if (!children.length) return "";
  return JSON.stringify({ type: "root", children });
};

const textToRich = (txt) => JSON.stringify({ type: "root", children: String(txt).split("\n").filter((l) => l.trim()).map((l) => ({ type: "paragraph", children: [{ type: "text", value: l }] })) });

const keyIngredientsToRich = (list) =>
  JSON.stringify({ type: "root", children: (list || []).map((k) => ({
    type: "paragraph",
    children: [{ type: "text", value: k.name || "", bold: true }, { type: "text", value: ` – ${k.effect || ""}` }],
  })) });

const parseKeyIngredients = (raw) => {
  try {
    const j = JSON.parse(raw);
    if (Array.isArray(j)) return j.map((x) => ({ name: x.name || "", effect: x.effect || x.benefit || "" }));
    if (j && j.type === "root") {
      return (j.children || []).map((p) => {
        const texts = (p.children || []).filter((c) => c.type === "text");
        const name = texts.filter((t) => t.bold).map((t) => t.value).join("").trim();
        const rest = texts.filter((t) => !t.bold).map((t) => t.value).join("").replace(/^[\s\u2013\-:]+/, "").trim();
        if (name) return { name, effect: rest };
        if (rest) {
          const m = rest.match(/^(.+?)\s*[\u2013\-:]\s*(.+)$/);
          return m ? { name: m[1], effect: m[2] } : { name: rest, effect: "" };
        }
        return null;
      }).filter(Boolean);
    }
  } catch {}
  return raw.split("\n").map((l) => l.trim()).filter(Boolean).map((l) => {
    const m = l.match(/^(.+?)\s*[\u2013\-:]\s*(.+)$/);
    return m ? { name: m[1], effect: m[2] } : { name: l, effect: "" };
  });
};

const sfHeaders = (s) => ({ "X-Shopify-Access-Token": s.shopifyToken });
const sfWriteHeaders = (s) => ({ ...sfHeaders(s), "Content-Type": "application/json" });
const sfBase = (s) => {
  const store = s.shopifyStore.replace(/^https?:\/\//, "").replace(/\/$/, "");
  if (s.proxyUrl) {
    let proxy = s.proxyUrl.trim().replace(/\/$/, "");
    if (!/^https?:\/\//.test(proxy)) proxy = "https://" + proxy;
    return `${proxy}/${store}/admin/api/2024-01`;
  }
  return `https://${store}/admin/api/2024-01`;
};

const fetchFromShopify = async (s, productId) => {
  const res = await fetch(`${sfBase(s)}/products/${productId}.json`, { headers: sfHeaders(s) });
  if (!res.ok) throw new Error(`Shopify svarade ${res.status} – kontrollera butik, token (read_products) och produkt-ID.`);
  const { product } = await res.json();
  const patch = {
    shopifyId: String(product.id),
    productName: product.title || "",
    originalName: product.title || "",
    description: product.body_html || "",
    tags: product.tags ? product.tags.split(", ").filter(Boolean) : [],
    handle: product.handle || "",
    currentHandle: product.handle || "",
    productType: detectType(product.title) || "",
  };
  const v0 = (product.variants || [])[0];
  if (v0 && v0.price) patch.price = String(v0.price).replace(/\.00$/, "");
  const sizeM = (product.title || "").match(/(\d+\s?(?:ml|g|st))\b/i);
  if (sizeM) patch.size = sizeM[1];
  patch._orig = { title: product.title || "", body: product.body_html || "", tags: product.tags || "" };
  try {
    const mfRes = await fetch(`${sfBase(s)}/products/${productId}/metafields.json`, { headers: sfHeaders(s) });
    if (mfRes.ok) {
      const mfs = (await mfRes.json()).metafields || [];
      const get = (k) => mfs.find((m) => m.key === k && m.namespace === "custom")?.value || "";
      patch._mfKeys = mfs.map((m) => m.namespace + "." + m.key);
      const inciKey = ["ingredienser", "ingredients", "inci"].find((k) => get(k));
      if (inciKey) { patch.inci = get(inciKey); patch._inciKey = inciKey; }
      patch.seoTitle = mfs.find((m) => m.key === "title_tag")?.value || "";
      patch.seoDescription = mfs.find((m) => m.key === "description_tag")?.value || "";
      const ingressKey = ["beskrivning", "short_description"].find((k) => get(k));
      if (ingressKey) { patch.shortDescription = richTextToHtml(get(ingressKey)); patch._ingressKey = ingressKey; }
      const bulletsKey = ["bullet_points_1", "bullet_points"].find((k) => get(k));
      if (bulletsKey) {
        patch.bulletPoints = [...get(bulletsKey).split("\n").map((l) => l.replace(/^[\u2713\u2714]\s*/, "").trim()).filter(Boolean), "", "", "", "", ""].slice(0, 5);
        patch._bulletsKey = bulletsKey;
      }
      const faq = [1, 2, 3, 4, 5].map((i) => ({ q: get(`faq_fraga_${i}`) || get(`faq_q${i}`), a: richTextToHtml(get(`faq_a${i}`)) })).filter((x) => x.q || x.a);
      if (faq.length) patch.faq = faq;
      const u = get("usage_instructions");
      if (u) {
        const parts = u.split(/\n\n/);
        patch.usage = { intro: parts[0] || "", steps: (parts[1] || "").split("\n").map((x) => x.replace(/^\d+\.\s*/, "")).filter(Boolean) };
      }
      const ki = get("key_ingredients");
      if (ki) { const parsed = parseKeyIngredients(ki); if (parsed.length) patch.keyIngredients = parsed; }
    }
  } catch {}
  try {
    const imgRes = await fetch(`${sfBase(s)}/products/${productId}/images.json`, { headers: sfHeaders(s) });
    if (imgRes.ok) {
      const imgs = (await imgRes.json()).images || [];
      patch.images = imgs.map((img) => ({
        shopifyImageId: img.id, url: img.src,
        filename: img.src.split("/").pop().split("?")[0],
        suggestedFilename: "", altText: img.alt || "",
      }));
    }
  } catch {}
  return patch;
};

const upsertMetafield = async (s, productId, existing, mf) => {
  const found0 = existing.find((m) => m.namespace === mf.namespace && m.key === mf.key);
  if (found0 && String(found0.value) === String(mf.value)) return { key: `${mf.namespace}.${mf.key}`, status: "oförändrad" };
  const send = async (value, type) => {
    const found = existing.find((m) => m.namespace === mf.namespace && m.key === mf.key);
    if (found) {
      return fetch(`${sfBase(s)}/metafields/${found.id}.json`, {
        method: "PUT", headers: sfWriteHeaders(s),
        body: JSON.stringify({ metafield: { id: found.id, value, type: found.type || type } }),
      });
    }
    return fetch(`${sfBase(s)}/products/${productId}/metafields.json`, {
      method: "POST", headers: sfWriteHeaders(s),
      body: JSON.stringify({ metafield: { namespace: mf.namespace, key: mf.key, value, type, owner_resource: "product" } }),
    });
  };
  let res = await send(mf.value, mf.type);
  if (!res.ok) {
    // Typmismatch mot definitionen? Prova den andra representationen automatiskt.
    if (mf.type === "multi_line_text_field" || mf.type === "single_line_text_field") {
      res = await send(textToRich(mf.value), "rich_text_field");
    } else if (mf.type === "rich_text_field") {
      const plain = richTextToHtml(mf.value).replace(/<\/(p|h[1-6]|li)>/g, "\n").replace(/<[^>]+>/g, "").trim();
      res = await send(plain, "multi_line_text_field");
    }
  }
  if (!res.ok) {
    let msg = ""; try { msg = JSON.stringify((await res.json()).errors); } catch {}
    return { key: `${mf.namespace}.${mf.key}`, status: "fel", msg: msg || String(res.status) };
  }
  return { key: `${mf.namespace}.${mf.key}`, status: found0 ? "uppdaterad" : "skapad" };
};

const publishProduct = async (s, p, onStep) => {
  if (!p.shopifyId) throw new Error("Produkten saknar Shopify-ID – hämta den från Shopify först.");
  const pid = p.shopifyId;
  const handleChanged = p.handle && p.currentHandle && p.handle !== p.currentHandle;
  const o = p._orig || {};
  const body = { product: { id: Number(pid) } };
  if (p.productName && p.productName !== o.title) body.product.title = p.productName;
  if (p.description && p.description !== o.body) body.product.body_html = p.description;
  const tagsStr = (p.tags || []).join(", ");
  if (tagsStr && tagsStr !== (o.tags || "")) body.product.tags = tagsStr;
  if (handleChanged) body.product.handle = p.handle;
  if (Object.keys(body.product).length > 1) {
    onStep("Uppdaterar ändrade produktfält...");
    const res = await fetch(`${sfBase(s)}/products/${pid}.json`, { method: "PUT", headers: sfWriteHeaders(s), body: JSON.stringify(body) });
    if (!res.ok) {
      let err = ""; try { err = JSON.stringify((await res.json()).errors); } catch {}
      throw new Error(`Shopify-fel ${res.status}: ${err || "kontrollera write_products-behörighet"}`);
    }
  }
  onStep("Uppdaterar metafält (SEO, FAQ, bullets, ingredienser)...");
  const mfRes = await fetch(`${sfBase(s)}/products/${pid}/metafields.json`, { headers: sfHeaders(s) });
  const existing = mfRes.ok ? (await mfRes.json()).metafields || [] : [];
  const mfs = [
    { namespace: "global", key: "title_tag", value: p.seoTitle, type: "single_line_text_field" },
    { namespace: "global", key: "description_tag", value: p.seoDescription, type: "single_line_text_field" },
    { namespace: "custom", key: p._inciKey || "ingredienser", value: p.inci, type: "multi_line_text_field" },
    { namespace: "custom", key: p._ingressKey || "beskrivning", value: htmlToRichText(p.shortDescription), type: "rich_text_field" },
    { namespace: "custom", key: p._bulletsKey || "bullet_points_1", value: (p.bulletPoints || []).filter(Boolean).map((b) => "\u2713 " + b).join("\n"), type: "multi_line_text_field" },
    { namespace: "custom", key: "usage_instructions", value: p.usage ? `${p.usage.intro}\n\n${(p.usage.steps || []).map((x, i) => `${i + 1}. ${x}`).join("\n")}` : "", type: "multi_line_text_field" },
    { namespace: "custom", key: "key_ingredients", value: (p.keyIngredients || []).length ? keyIngredientsToRich(p.keyIngredients) : "", type: "rich_text_field" },
    ...(p.faq || []).flatMap((f, i) => [
      { namespace: "custom", key: `faq_fraga_${i + 1}`, value: f.q, type: "single_line_text_field" },
      { namespace: "custom", key: `faq_a${i + 1}`, value: htmlToRichText(f.a), type: "rich_text_field" },
    ]),
  ];
  const log = [];
  for (const mf of mfs) {
    if (!mf.value) { log.push({ key: `${mf.namespace}.${mf.key}`, status: "tom – skickades inte" }); continue; }
    log.push(await upsertMetafield(s, pid, existing, mf));
  }
  const imgsToUpdate = (p.images || []).filter((i) => i.shopifyImageId && i.altText);
  if (imgsToUpdate.length) {
    onStep("Uppdaterar alt-texter...");
    for (const img of imgsToUpdate) {
      await fetch(`${sfBase(s)}/products/${pid}/images/${img.shopifyImageId}.json`, {
        method: "PUT", headers: sfWriteHeaders(s),
        body: JSON.stringify({ image: { id: img.shopifyImageId, alt: img.altText } }),
      });
    }
  }
  if (handleChanged) {
    onStep("Skapar 301-redirect för gamla URL:en...");
    await fetch(`${sfBase(s)}/redirects.json`, {
      method: "POST", headers: sfWriteHeaders(s),
      body: JSON.stringify({ redirect: { path: `/products/${p.currentHandle}`, target: `/products/${p.handle}` } }),
    });
  }
  return { handleChanged, log };
};

function EcloreProduktstudio() {
  const [mode, setMode] = useState("single");
  const [form, setForm] = useState(emptyProduct());
  const [storeProfile, setStoreProfile] = useState(DEFAULT_PROFILE);
  const [generating, setGenerating] = useState({});
  const [allProgress, setAllProgress] = useState("");
  const [copied, setCopied] = useState("");
  const [error, setError] = useState("");
  const [showProfile, setShowProfile] = useState(false);

  // Kö
  const [queue, setQueue] = useState([]);
  const [draft, setDraft] = useState(null); // produkt som håller på att läggas till
  const [queueRunning, setQueueRunning] = useState(false);
  const [queueProgress, setQueueProgress] = useState("");
  const [reviewIdx, setReviewIdx] = useState(-1); // -1 = listvy
  const [editId, setEditId] = useState(null);

  // Shopify
  const [settings, setSettings] = useState(() => {
    const base = { shopifyStore: "", shopifyToken: "", anthropicKey: "", proxyUrl: "" };
    try { return { ...base, ...JSON.parse(localStorage.getItem("eclore_settings") || "{}") }; } catch { return base; }
  });
  useEffect(() => {
    try { localStorage.setItem("eclore_settings", JSON.stringify(settings)); } catch {}
  }, [settings]);
  const [showSettings, setShowSettings] = useState(false);
  const [singleId, setSingleId] = useState("");
  const [queueIds, setQueueIds] = useState("");
  const [sfBusy, setSfBusy] = useState("");
  const [sfError, setSfError] = useState("");
  const [publishState, setPublishState] = useState({});
  const [publishLog, setPublishLog] = useState({});

  const sfReady = settings.shopifyStore && settings.shopifyToken;

  const fetchSingle = async () => {
    if (!sfReady || !singleId.trim()) { setSfError("Fyll i butik, token och produkt-ID."); return; }
    setSfError(""); setSfBusy("single");
    try {
      const patch = await fetchFromShopify(settings, singleId.trim());
      setForm((f) => ({ ...f, ...patch, brandNote: f.brandNote }));
    } catch (e) { setSfError(e.message); }
    setSfBusy("");
  };

  const fetchSourceText = async (p, set) => {
    if (!p.brandUrl) return;
    let proxy = (settings.proxyUrl || "").trim().replace(/\/$/, "");
    if (!proxy) { setSfError("Källhämtning kräver CORS-proxyn – fyll i proxy-URL och uppdatera workern med nya worker.js."); return; }
    if (!/^https?:\/\//.test(proxy)) proxy = "https://" + proxy;
    set((x) => ({ ...x, _srcBusy: true }));
    try {
      const res = await fetch(`${proxy}/fetch?url=${encodeURIComponent(p.brandUrl)}`);
      if (!res.ok) throw new Error(`Workern svarade ${res.status} – är den uppdaterad med /fetch-stödet?`);
      const html = await res.text();
      const text = html
        .replace(/<script[\s\S]*?<\/script>/gi, " ")
        .replace(/<style[\s\S]*?<\/style>/gi, " ")
        .replace(/<[^>]+>/g, " ")
        .replace(/\s+/g, " ")
        .trim().slice(0, 4000);
      set((x) => ({ ...x, sourceText: text, _srcBusy: false }));
      setSfError("");
    } catch (e) {
      console.error(e);
      set((x) => ({ ...x, _srcBusy: false }));
      setSfError(`Kunde inte hämta källsidan: ${e.message}`);
    }
  };

  const fetchToQueue = async () => {
    const ids = queueIds.split(/[\n,;]+/).map((x) => x.trim()).filter(Boolean);
    if (!sfReady || !ids.length) { setSfError("Fyll i butik, token och minst ett produkt-ID."); return; }
    setSfError(""); setSfBusy("queue");
    for (let i = 0; i < ids.length; i++) {
      setQueueProgress(`Hämtar produkt ${i + 1}/${ids.length} från Shopify...`);
      try {
        const patch = await fetchFromShopify(settings, ids[i]);
        setQueue((q) => [...q, { ...emptyProduct(), ...patch, status: "väntar" }]);
      } catch (e) { setSfError(`ID ${ids[i]}: ${e.message}`); }
    }
    setQueueProgress(""); setQueueIds(""); setSfBusy("");
  };

  const publish = async (p, source) => {
    if (!sfReady) { setSfError("Fyll i Shopify-inställningarna först."); return; }
    setSfError("");
    setPublishState((s) => ({ ...s, [p.id]: "Publicerar..." }));
    try {
      const result = await publishProduct(settings, p, (step) => setPublishState((s) => ({ ...s, [p.id]: step })));
      setPublishLog((s) => ({ ...s, [p.id]: result.log }));
      const errCount = result.log.filter((l) => l.status === "fel").length;
      let msg = result.handleChanged ? "✓ Publicerad + 301-redirect skapad" : "✓ Publicerad";
      if (errCount) msg = `⚠ Publicerad, men ${errCount} fält nekades – se loggen nedan`;
      setPublishState((s) => ({ ...s, [p.id]: msg }));
      if (source === "queue") updateQueueItem(p.id, { currentHandle: p.handle });
      else setForm((f) => ({ ...f, currentHandle: f.handle }));
    } catch (e) {
      setPublishState((s) => ({ ...s, [p.id]: `✕ ${e.message}` }));
    }
  };

  const setField = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const updateQueueItem = (id, patch) =>
    setQueue((q) => q.map((p) => (p.id === id ? { ...p, ...(typeof patch === "function" ? patch(p) : patch) } : p)));

  const doCopy = async (key, txt) => {
    try { await navigator.clipboard.writeText(txt); setCopied(key); setTimeout(() => setCopied(""), 1500); } catch {}
  };

  /* ── Enskilt läge ── */
  const generateField = async (field) => {
    if (!form.productName) { setError("Fyll i produktnamn först."); return; }
    if (!settings.anthropicKey) { setError("Lägg in din Anthropic API-nyckel under Inställningar."); setShowSettings(true); return; }
    setError("");
    setGenerating((g) => ({ ...g, [field]: true }));
    try {
      const patch = await genField(form, field, storeProfile, false, settings.anthropicKey);
      setForm((f) => ({ ...f, ...patch }));
    } catch (e) { console.error(e); setError(`Kunde inte generera ${field}. Försök igen.`); }
    setGenerating((g) => ({ ...g, [field]: false }));
  };

  const generateAllSingle = async () => {
    if (!form.productName) { setError("Fyll i produktnamn först."); return; }
    if (!settings.anthropicKey) { setError("Lägg in din Anthropic API-nyckel under Inställningar."); setShowSettings(true); return; }
    setError("");
    let cur = { ...form };
    const failed = [];
    for (const [field, label] of PIPELINE) {
      if (field === "keywords" && cur.primaryKeyword) continue;
      if (field === "productNames") continue; // manuellt val i enskilt läge
      setAllProgress(label + "...");
      try {
        const patch = await genField(cur, field, storeProfile, false, settings.anthropicKey);
        cur = { ...cur, ...patch };
        setForm((f) => ({ ...f, ...patch }));
      } catch (e) { console.error(e); failed.push(label); }
    }
    if (failed.length) {
      setError(`Kunde inte generera: ${failed.join(", ")}. Tryck Generera på respektive fält för att försöka igen.`);
      setAllProgress("");
      return;
    }
    setAllProgress("✓ Klart");
    setTimeout(() => setAllProgress(""), 3000);
  };

  const generateImageMeta = async (idx) => {
    setGenerating((g) => ({ ...g, [`img_${idx}`]: true }));
    try {
      const img = form.images[idx] || {};
      let imageBlock = null;
      if (img.url) {
        try {
          const u = img.url + (img.url.includes("?") ? "&" : "?") + "width=800";
          const blob = await (await fetch(u)).blob();
          const b64 = await new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result.split(",")[1]);
            r.onerror = reject;
            r.readAsDataURL(blob);
          });
          imageBlock = { type: "image", source: { type: "base64", media_type: blob.type || "image/jpeg", data: b64 } };
        } catch (e) { console.error("Kunde inte hämta bilden – genererar utan bildanalys", e); }
      }
      const promptText = `${buildCtx(form, storeProfile)}\n\nFör produktbild ${idx + 1}${imageBlock ? " (bilden bifogas – titta på den och beskriv vad som FAKTISKT syns: produkt/förpackning, händer, hudtextur, miljö, färger osv.)" : ""}, nuvarande filnamn: "${img.filename || ""}". Generera:\n1. SEO-filnamn på svenska (lowercase, bindestreck, .jpg, max 60 tecken, primärt sökord eller produkttyp + det bilden visar)\n2. Alt-text på svenska (max 125 tecken) som beskriver bildens faktiska innehåll + produktnamnet\nSvara BARA med JSON: {"suggestedFilename":"...","altText":"..."}`;
      const content = imageBlock ? [imageBlock, { type: "text", text: promptText }] : promptText;
      const j = safeParse(stripFences(await callClaude(content, settings.anthropicKey)));
      setForm((f) => {
        const imgs = [...f.images];
        imgs[idx] = { ...imgs[idx], suggestedFilename: j.suggestedFilename, altText: j.altText };
        return { ...f, images: imgs };
      });
    } catch (e) { console.error(e); }
    setGenerating((g) => ({ ...g, [`img_${idx}`]: false }));
  };

  /* ── Köläge ── */
  const runQueue = async () => {
    if (!settings.anthropicKey) { setSfError("Lägg in din Anthropic API-nyckel under Inställningar."); setShowSettings(true); return; }
    setQueueRunning(true);
    const items = queue.filter((p) => p.status === "väntar" || p.status === "fel");
    for (let i = 0; i < items.length; i++) {
      let cur = { ...items[i], status: "genererar" };
      updateQueueItem(cur.id, { status: "genererar" });
      const failed = [];
      // Hämta källtext från varumärkeslänken automatiskt om den saknas
      if (cur.brandUrl && !cur.sourceText && settings.proxyUrl) {
        setQueueProgress(`Produkt ${i + 1}/${items.length} · ${cur.productName.slice(0, 28)} · Hämtar källtext...`);
        try {
          let proxy = settings.proxyUrl.trim().replace(/\/$/, "");
          if (!/^https?:\/\//.test(proxy)) proxy = "https://" + proxy;
          const res = await fetch(`${proxy}/fetch?url=${encodeURIComponent(cur.brandUrl)}`);
          if (res.ok) {
            const html = await res.text();
            const text = html
              .replace(/<script[\s\S]*?<\/script>/gi, " ")
              .replace(/<style[\s\S]*?<\/style>/gi, " ")
              .replace(/<[^>]+>/g, " ")
              .replace(/\s+/g, " ")
              .trim().slice(0, 4000);
            cur = { ...cur, sourceText: text };
            updateQueueItem(cur.id, { sourceText: text });
          }
        } catch (e) { console.error("Källtext kunde inte hämtas, fortsätter utan", e); }
      }
      for (const [field, label] of PIPELINE) {
        if (field === "keywords" && cur.primaryKeyword) continue;
        setQueueProgress(`Produkt ${i + 1}/${items.length} · ${cur.productName.slice(0, 28)} · ${label}...`);
        try {
          const patch = await genField(cur, field, storeProfile, true, settings.anthropicKey);
          cur = { ...cur, ...patch };
          updateQueueItem(cur.id, patch);
        } catch (e) { console.error(e); failed.push(label); }
      }
      updateQueueItem(cur.id, { status: failed.length ? "fel" : "klar" });
      if (failed.length) setQueueProgress(`${cur.productName.slice(0, 28)}: kunde inte generera ${failed.join(", ")} – kör kön igen för nytt försök.`);
    }
    setQueueProgress("✓ Kön klar – dags att granska");
    setQueueRunning(false);
  };

  /* ───────────── Enskilt läge ───────────── */
  const SingleView = () => {

    return (

              <span style={{ ...S.small, color: form.seoTitle.length > 60 ? "#9B3B2E" : "#7A8468" }}>{form.seoTitle.length}/60 tecken</span>
              <VariantPicker label="Tre strategier – klicka för att välja:" variants={form.titleVariants} current={form.seoTitle} why={form.titleWhy}
                onPick={(t) => setField("seoTitle", t)} strategies={TITLE_STRATEGIES} />
            </OutBlock>

            <UrlBlock p={form} set={(patch) => setForm((f) => ({ ...f, ...patch }))}
              onGenerate={() => generateField("urlHandle")} busy={!!generating.urlHandle} />

            <OutBlock ui={ui} title="Meta-beskrivning" field="seoDescription" copyValue={form.seoDescription}>
              <textarea style={{ ...S.ta, minHeight: 54 }} value={form.seoDescription} onChange={(e) => setField("seoDescription", e.target.value)} />
              <span style={{ ...S.small, color: form.seoDescription.length > 155 ? "#9B3B2E" : "#7A8468" }}>{form.seoDescription.length}/155 tecken</span>
            </OutBlock>

            <OutBlock ui={ui} title="Ingress (above the fold)" field="shortDescription" copyValue={form.shortDescription}>
              <textarea style={{ ...S.ta, minHeight: 80 }} value={form.shortDescription} onChange={(e) => setField("shortDescription", e.target.value)} />
            </OutBlock>

            <OutBlock ui={ui} title="Bullet points" field="bulletPoints" copyValue={form.bulletPoints.filter(Boolean).join("\n")}>
              {form.bulletPoints.map((b, i) => (
                <input key={i} style={{ ...S.input, marginBottom: 6 }} value={b}
                  onChange={(e) => { const arr = [...form.bulletPoints]; arr[i] = e.target.value; setField("bulletPoints", arr); }} />
              ))}
            </OutBlock>

            <OutBlock ui={ui} title="Produktbeskrivning (HTML)" field="description" copyValue={form.description}>
              <textarea style={{ ...S.ta, minHeight: 180, fontFamily: "ui-monospace,monospace", fontSize: 12 }} value={form.description} onChange={(e) => setField("description", e.target.value)} />
              {form.description && (
                <details style={{ marginTop: 6 }}>
                  <summary style={{ ...S.small, cursor: "pointer" }}>Förhandsgranska</summary>
                  <div style={{ ...S.out, marginTop: 6 }} dangerouslySetInnerHTML={{ __html: form.description }} />
                </details>
              )}
            </OutBlock>

            <OutBlock ui={ui} title="FAQ (5 st)" field="faq" copyValue={form.faq.map((f) => `${f.q}\n${f.a}`).join("\n\n")}>
              {form.faq.length === 0 ? <div style={S.out}>Inte genererad ännu.</div> :
                form.faq.map((f, i) => (
                  <div key={i} style={{ marginBottom: 8 }}>
                    <input style={{ ...S.input, fontWeight: 600, marginBottom: 4 }} value={f.q}
                      onChange={(e) => { const arr = [...form.faq]; arr[i] = { ...arr[i], q: e.target.value }; setField("faq", arr); }} />
                    <textarea style={{ ...S.ta, minHeight: 60, fontSize: 12 }} value={f.a}
                      onChange={(e) => { const arr = [...form.faq]; arr[i] = { ...arr[i], a: e.target.value }; setField("faq", arr); }} />
                  </div>
                ))}
            </OutBlock>

            <OutBlock ui={ui} title="Användningsinstruktioner" field="usage"
              copyValue={form.usage ? `${form.usage.intro}\n\n${(form.usage.steps || []).map((s, i) => `${i + 1}. ${s}`).join("\n")}` : ""}>
              {form.usage ? (
                <div style={S.out}>
                  <p style={{ marginTop: 0 }}>{form.usage.intro}</p>
                  <ol style={{ margin: 0, paddingLeft: 18 }}>{(form.usage.steps || []).map((s, i) => <li key={i}>{s}</li>)}</ol>
                </div>
              ) : <div style={S.out}>Inte genererad ännu.</div>}
            </OutBlock>

            <OutBlock ui={ui} title={form.productType === "Accessoar / Necessär" ? "Funktioner & material" : "Nyckelingredienser"} field="keyIngredients" copyValue={form.keyIngredients.map((k) => `${k.name} – ${k.effect}`).join("\n")}>
              {form.keyIngredients.length === 0 ? <div style={S.out}>Inte genererade ännu.</div> : (
                <div style={S.out}>{form.keyIngredients.map((k, i) => <div key={i} style={{ marginBottom: 4 }}><strong>{k.name}</strong> – {k.effect}</div>)}</div>
              )}
            </OutBlock>

            <OutBlock ui={ui} title="Produkttaggar" field="tags" copyValue={form.tags.join(", ")}>
              {form.tags.length === 0 ? <div style={S.out}>Inte genererade ännu.</div> : (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{form.tags.map((t, i) => <span key={i} style={S.chip(true)}>{t}</span>)}</div>
              )}
            </OutBlock>
          </div>
        </section>

        <section style={S.card}>
          <h2 style={S.h2}>4 · Bilder (filnamn + alt-text)</h2>
          {form.images.map((img, i) => (
            <div key={i} style={{ ...S.out, marginBottom: 8 }}>
              <label style={S.label}>Nuvarande filnamn</label>
              <input style={S.input} value={img.filename}
                onChange={(e) => { const arr = [...form.images]; arr[i] = { ...arr[i], filename: e.target.value }; setField("images", arr); }} />
              {img.suggestedFilename && <p style={{ margin: "4px 0", fontSize: 12 }}><strong>Förslag:</strong> {img.suggestedFilename}</p>}
              {img.altText && <p style={{ margin: "4px 0", fontSize: 12 }}><strong>Alt-text:</strong> {img.altText}</p>}
              <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
                <button style={S.btnGhost} onClick={() => generateImageMeta(i)} disabled={!!generating[`img_${i}`]}>
                  {generating[`img_${i}`] ? "Genererar..." : "Generera"}
                </button>
                {(img.suggestedFilename || img.filename) && <button style={S.btnGhost} onClick={() => doCopy(`imgf_${i}`, img.suggestedFilename || img.filename)}>{copied === `imgf_${i}` ? "✓" : "Kopiera filnamn"}</button>}
                {img.altText && <button style={S.btnGhost} onClick={() => doCopy(`imga_${i}`, img.altText)}>{copied === `imga_${i}` ? "✓" : "Kopiera alt-text"}</button>}
                <button style={{ ...S.btnGhost, color: "#9B3B2E", borderColor: "#D8B4AC" }} onClick={() => setField("images", form.images.filter((_, x) => x !== i))}>Ta bort</button>
              </div>
            </div>
          ))}
          <button style={S.btnGhost} onClick={() => setField("images", [...form.images, { filename: "", suggestedFilename: "", altText: "" }])}>+ Lägg till bild</button>
        </section>

        <ChecksPanel p={form} />

        {form.shopifyId && (
          <section style={{ ...S.card, borderLeft: "4px solid #46522F" }}>
            <h2 style={S.h2}>Publicera till Shopify</h2>
            <p style={S.small}>Uppdaterar produktnamn, beskrivning, taggar, URL, SEO-metafält, ingress, bullets, FAQ, användning, nyckelingredienser och alt-texter.</p>
            <button style={{ ...S.btn, marginTop: 8 }} onClick={() => publish(form, "single")} disabled={!sfReady}>
              Publicera till Shopify
            </button>
            {publishState[form.id] && <p style={{ fontSize: 13, marginTop: 8, color: publishState[form.id].startsWith("✕") ? "#9B3B2E" : "#46522F" }}>{publishState[form.id]}</p>}
            <PubLog log={publishLog[form.id]} />
          </section>
        )}
      </div>
    );
  };

  return (
    <div style={S.page}>
      <div style={S.wrap}>
        <header style={{ marginBottom: 14 }}>
          <h1 style={{ fontFamily: "Georgia,serif", fontSize: 26, fontWeight: 600, margin: 0, color: "#2C351C" }}>
            éclore <span style={{ fontStyle: "italic", fontWeight: 400 }}>produktstudio</span>
          </h1>
          <p style={{ ...S.small, marginTop: 4 }}>Produktanpassade texter med rätt sökord, certifieringar och USP:ar – enligt éclores SEO-regler.</p>
        </header>

        <div style={{ display: "flex", gap: 4, background: "#E4E8DB", borderRadius: 10, padding: 4, marginBottom: 14, width: "fit-content" }}>
          <button style={S.tab(mode === "single")} onClick={() => { setMode("single"); setReviewIdx(-1); }}>Enskild produkt</button>
          <button style={S.tab(mode === "queue")} onClick={() => setMode("queue")}>
            Kö {queue.length > 0 ? `(${queue.length})` : ""}
          </button>
        </div>

        {mode === "single" ? SingleView() : (reviewIdx >= 0 ? ReviewView() : QueueView())}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<EcloreProduktstudio />);

</script>
</body>
</html>
