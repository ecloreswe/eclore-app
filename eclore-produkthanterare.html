- "portabilitet" → skriv "lätt att ta med" eller omformulera

HÅRDA REGLER:
1. Svenska. Naturligt språk, ingen keyword stuffing.
2. Primärt sökord ska finnas i första meningen av beskrivning och ingress – men det FÅR böjas och kompletteras med småord (med, och, för) så att meningen blir korrekt svenska. Grammatik går ALLTID före exakt ordföljd.
3. Nämn certifieringar/egenskaper ENDAST om de står i listan ovan. Skriv aldrig "ekologisk", "COSMOS", "parfymfri" etc. om det inte är angivet.
4. Nämn utmärkelser endast om de anges – och då gärna tidigt.
5. H2-rubriker = sökord och kundnytta, inte varumärkesupprepning.
6. Påstå inget medicinskt (botar, läker, behandlar eksem etc.) – skriv "kan lugna", "återfuktar", "stödjer". Förbjudet: "stimulerar kollagenproduktionen" → skriv "kan stödja hudens kollagenbildning". Förbjudet: "aktiverar förnyelsecykeln" → skriv "bidrar till cellförnyelse". Förbjudet: "arbetar nattetid" / "levererar resultat medan du sover" om det inte anges i produktfakta att det är ett nattserum. Förbjudet: "redan första användningen" / "från första tvätten" – omedelbart resultatpåstående som bara får användas om det explicit stöds av källmaterialet. Förbjudet: "omedelbar lindring", "lindrar omedelbart" – samma regel. Förbjudet: "arbetar aktivt för att återställa balansen" – abstrakt, beskriv istället vad ingrediensen konkret gör.
